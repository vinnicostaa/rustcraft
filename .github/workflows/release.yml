name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate tag matches workspace version
        id: version
        shell: bash
        run: |
          version="$(python - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["workspace"]["package"]["version"])
          PY
          )"

          expected="v${version}"
          actual="${GITHUB_REF_NAME}"

          if [ "$actual" != "$expected" ]; then
            echo "Tag ${actual} does not match Cargo.toml version ${expected}" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build Artifact (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Bevy Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0

      - name: Build release binary
        run: cargo build -p rustcraft --release --locked

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ needs.validate-version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p dist/package
          cp target/release/rustcraft dist/package/rustcraft
          tar -czf "dist/rustcraft-${VERSION}-${PLATFORM}.tar.gz" -C dist/package rustcraft

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist/package
          Copy-Item target/release/rustcraft.exe dist/package/rustcraft.exe
          Compress-Archive -Path dist/package/rustcraft.exe -DestinationPath "dist/rustcraft-$env:VERSION-windows.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustcraft-${{ needs.validate-version.outputs.version }}-${{ matrix.platform }}
          path: dist/rustcraft-${{ needs.validate-version.outputs.version }}-${{ matrix.platform }}.*
          if-no-files-found: error
          archive: false

  publish-release:
    name: Publish GitHub Release
    needs: [validate-version, build-artifacts]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "rustcraft ${VERSION}" \
            --generate-notes
